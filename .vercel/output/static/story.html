<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mayel Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .story {
      position: relative;
      width: 390px;
      height: 692px;
      overflow: hidden;
      border-radius: 16px;
    }

    /* Background food photo */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('/images/burger.jpg');
      background-size: cover;
      background-position: center 40%;
    }

    /* Dark overlays */
    .overlay-top {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(6,7,15,0.85) 0%,
        rgba(6,7,15,0.3) 40%,
        rgba(6,7,15,0.3) 60%,
        rgba(6,7,15,0.92) 100%
      );
    }

    /* Subtle blue tint */
    .overlay-blue {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(24,112,184,0.12) 0%, transparent 70%);
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 32px 44px;
    }

    /* Top — logo */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-text {
      font-family: 'Raleway', sans-serif;
      font-weight: 900;
      font-size: 3.2rem;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo-text .y {
      color: #1870b8;
    }

    .logo-tag {
      font-family: 'Inter', sans-serif;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(24,112,184,0.8);
    }

    /* Middle — main message */
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .badge {
      background: rgba(24,112,184,0.2);
      border: 1px solid rgba(24,112,184,0.5);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #1870b8;
    }

    .headline {
      font-family: 'Raleway', sans-serif;
      font-weight: 900;
      font-size: 2.4rem;
      color: #fff;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .headline span {
      color: #1870b8;
    }

    .subtext {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      max-width: 260px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      justify-content: center;
      margin-top: 4px;
    }

    .divider-line {
      height: 1px;
      width: 40px;
      background: linear-gradient(90deg, transparent, rgba(24,112,184,0.6));
    }

    .divider-line.right {
      background: linear-gradient(270deg, transparent, rgba(24,112,184,0.6));
    }

    .divider-text {
      font-family: 'Inter', sans-serif;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(24,112,184,0.7);
    }

    /* Bottom — CTA */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .cta-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .cta-url {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      color: #fff;
      letter-spacing: 0.05em;
      background: rgba(24,112,184,0.25);
      border: 1px solid rgba(24,112,184,0.4);
      border-radius: 100px;
      padding: 10px 28px;
      width: 100%;
      text-align: center;
    }

    .repeat-tag {
      font-family: 'Inter', sans-serif;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* Noise texture overlay */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* Corner accent dots */
    .corner-tl {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1870b8;
      opacity: 0.6;
    }
    .corner-tr {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1870b8;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="overlay-top"></div>
    <div class="overlay-blue"></div>
    <div class="noise"></div>
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>

    <div class="content">

      <!-- TOP LOGO -->
      <div class="top">
        <div class="logo-text">MA<span class="y">Y</span>EL</div>
        <div class="logo-tag">Order · Eat · Repeat</div>
      </div>

      <!-- MAIN MESSAGE -->
      <div class="middle">
        <div class="badge">✦ New Look</div>
        <div class="headline">
          We have<br/>a <span>new look.</span>
        </div>
        <div class="subtext">
          Browse our full menu online —<br/>anytime, anywhere.
        </div>
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text">Order · Eat · Repeat 🔁</div>
          <div class="divider-line right"></div>
        </div>
      </div>

      <!-- BOTTOM CTA -->
      <div class="bottom">
        <div class="cta-label">Tap the link in bio or visit</div>
        <div class="cta-url">mayelrestaurant.vercel.app</div>
        <div class="repeat-tag">© Mayel Restaurant</div>
      </div>

    </div>
  </div>
</body>
</html>
