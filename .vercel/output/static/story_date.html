<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Date Night</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/couple2.jpg');background-size:cover;background-position:center top}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.6) 0%,rgba(6,7,15,.05) 25%,rgba(6,7,15,.35) 65%,rgba(6,7,15,.97) 100%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .bottom{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;width:100%}
    .eyebrow{font-size:.48rem;color:#c9a84c;letter-spacing:.5em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.2rem;color:#fff;line-height:.92;letter-spacing:-.02em}
    .title span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:rgba(255,255,255,.55);line-height:1.5}
    .divider{display:flex;align-items:center;gap:10px;width:100%}
    .div-line{height:1px;flex:1;background:rgba(255,255,255,.08)}
    .div-text{font-size:.42rem;color:rgba(255,255,255,.2);letter-spacing:.35em;text-transform:uppercase}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.6rem;color:#1870b8}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="bottom">
        <div class="eyebrow">Good Company</div>
        <div class="title">DATE<br/>NIGHT<br/><span>DONE<br/>RIGHT.</span></div>
        <div class="sub">Food hits different when you share it.</div>
        <div class="divider">
          <div class="div-line"></div>
          <div class="div-text">Order · Eat · Repeat</div>
          <div class="div-line"></div>
        </div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
