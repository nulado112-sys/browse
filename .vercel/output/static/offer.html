<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel Combo Offer</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;padding:16px}

    /* Square post — 1:1 for Instagram feed */
    .post{
      position:relative;
      width:390px;
      height:390px;
      overflow:hidden;
      border-radius:20px;
      background:#06070f;
      flex-shrink:0;
    }

    /* Background food photo */
    .bg{
      position:absolute;
      inset:0;
      background-image:url('/images/burger.jpg');
      background-size:cover;
      background-position:center 60%;
      filter:saturate(1.1);
    }

    /* Overlays */
    .ov-dark{position:absolute;inset:0;background:rgba(6,7,15,.78)}
    .ov-blue{position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 100%,rgba(24,112,184,.18) 0%,transparent 65%)}
    .ov-gold{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#c9a84c,transparent)}

    /* Content */
    .content{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:22px 24px 20px;
    }

    /* Top row */
    .top{width:100%;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.1rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .logo-tag{font-size:.38rem;color:rgba(24,112,184,.6);letter-spacing:.3em;text-transform:uppercase;font-weight:600;margin-top:1px}
    .badge-new{background:linear-gradient(135deg,#c9a84c,#a8762a);border-radius:100px;padding:5px 12px;font-family:'Raleway',sans-serif;font-weight:800;font-size:.55rem;color:#fff;letter-spacing:.2em;text-transform:uppercase}

    /* Middle — main offer */
    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
    .combo-label{font-size:.5rem;color:#c9a84c;letter-spacing:.5em;text-transform:uppercase;font-weight:700}
    .combo-title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.4rem;color:#fff;line-height:.9;letter-spacing:-.03em}
    .combo-title span{color:#1870b8}
    .add-on{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;color:rgba(255,255,255,.55);line-height:1.4}
    .add-on strong{color:rgba(255,255,255,.8);font-style:normal}

    /* Items */
    .items{display:flex;align-items:center;justify-content:center;gap:8px}
    .item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .item-icon{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
    .item-name{font-size:.48rem;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
    .plus{font-size:1rem;color:rgba(255,255,255,.2);font-weight:300;margin-bottom:14px}

    /* Price */
    .price-wrap{display:flex;align-items:flex-start;gap:4px}
    .price-currency{font-family:'Raleway',sans-serif;font-weight:700;font-size:1.1rem;color:#1870b8;margin-top:6px}
    .price-num{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.8rem;color:#1870b8;line-height:1;letter-spacing:-.04em}
    .price-only{font-size:.45rem;color:rgba(255,255,255,.3);letter-spacing:.3em;text-transform:uppercase;font-weight:600;margin-top:4px}

    /* Bottom */
    .bottom{width:100%;display:flex;flex-direction:column;align-items:center;gap:8px}
    .applies{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
    .applies-label{font-size:.45rem;color:rgba(255,255,255,.3);letter-spacing:.25em;text-transform:uppercase}
    .tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:4px 10px;font-size:.5rem;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.05em}
    .tag.blue{border-color:rgba(24,112,184,.35);color:rgba(24,112,184,.8)}
  </style>
</head>
<body>
  <div class="post">
    <div class="bg"></div>
    <div class="ov-dark"></div>
    <div class="ov-blue"></div>
    <div class="ov-gold"></div>

    <div class="content">

      <!-- Top -->
      <div class="top">
        <div>
          <div class="logo">MA<span>Y</span>EL</div>
          <div class="logo-tag">Order · Eat · Repeat</div>
        </div>
        <div class="badge-new">✦ New Offer</div>
      </div>

      <!-- Middle -->
      <div class="middle">
        <div class="combo-label">Special Deal</div>
        <div class="combo-title">COM<span>B</span>O<br/>ADD-ON</div>
        <div class="add-on">Add to any <strong>Sandwich · Wrap · Kaaek</strong></div>

        <!-- Items row -->
        <div class="items">
          <div class="item">
            <div class="item-icon">🍟</div>
            <div class="item-name">Fries</div>
          </div>
          <div class="plus">+</div>
          <div class="item">
            <div class="item-icon">🥤</div>
            <div class="item-name">Soft Drink</div>
          </div>
          <div class="plus">+</div>
          <div class="item">
            <div class="item-icon">🍗</div>
            <div class="item-name">3 Tenders</div>
          </div>
        </div>

        <!-- Price -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <div class="price-wrap">
            <div class="price-currency">$</div>
            <div class="price-num">5</div>
          </div>
          <div class="price-only">Only · Add to your order</div>
        </div>
      </div>

      <!-- Bottom -->
      <div class="bottom">
        <div class="applies-label">Applies to</div>
        <div class="applies">
          <div class="tag blue">🥪 Sandwiches</div>
          <div class="tag blue">🌯 Wraps</div>
          <div class="tag blue">🥖 Kaaek</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
