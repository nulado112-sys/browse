<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Everything</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/mayel_collage.jpg');background-size:cover;background-position:center top}
    .ov{position:absolute;inset:0;background:rgba(6,7,15,.45)}
    .bottom-fade{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,rgba(6,7,15,.97) 0%,transparent 100%)}
    .gold-line{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#c9a84c,transparent)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 28px 52px;z-index:1}
    .inner{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;width:100%}
    .eyebrow{font-size:.48rem;color:#c9a84c;letter-spacing:.5em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.6rem;color:#fff;line-height:.95;letter-spacing:-.02em}
    .title span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.5);line-height:1.4}
    .divider{display:flex;align-items:center;gap:10px;width:100%}
    .div-line{height:1px;flex:1;background:rgba(255,255,255,.08)}
    .div-text{font-size:.42rem;color:rgba(255,255,255,.2);letter-spacing:.35em;text-transform:uppercase}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.6rem;color:#1870b8}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="bottom-fade"></div>
    <div class="gold-line"></div>
    <div class="content">
      <div class="inner">
        <div class="eyebrow">The Full Experience</div>
        <div class="title">EVERY<br/><span>THING</span><br/>ON THE TABLE.</div>
        <div class="sub">Burgers · Sandwiches · Wraps<br/>Kaaek · Platters · Desserts</div>
        <div class="divider">
          <div class="div-line"></div>
          <div class="div-text">Order · Eat · Repeat</div>
          <div class="div-line"></div>
        </div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
