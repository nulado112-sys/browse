<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel Story 6</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    /* Split background */
    .bg-left{position:absolute;top:0;left:0;width:50%;height:100%;background-image:url('/images/burger.jpg');background-size:cover;background-position:center}
    .bg-right{position:absolute;top:0;right:0;width:50%;height:100%;background-image:url('/images/chef.jpg');background-size:cover;background-position:center top}
    .ov{position:absolute;inset:0;background:rgba(6,7,15,.65)}
    .split-line{position:absolute;top:0;bottom:0;left:50%;width:2px;background:linear-gradient(to bottom,transparent,#1870b8,#c9a84c,#1870b8,transparent);transform:translateX(-50%)}
    .vs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:#0d0e1a;border:2px solid #1870b8;display:flex;align-items:center;justify-content:center;font-family:'Raleway',sans-serif;font-weight:900;font-size:.7rem;color:#1870b8;letter-spacing:.05em;z-index:2}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:44px 20px 40px;z-index:1}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.6rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .middle{width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
    .label{font-size:.55rem;color:#c9a84c;letter-spacing:.4em;text-transform:uppercase;font-weight:700}
    .question{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.9rem;color:#fff;text-align:center;line-height:1.1}
    .options{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .opt{padding:18px 10px;border-radius:16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
    .opt-a{background:rgba(24,112,184,.2);border:2px solid rgba(24,112,184,.5)}
    .opt-b{background:rgba(201,168,76,.1);border:2px solid rgba(201,168,76,.3)}
    .opt-icon{font-size:1.8rem}
    .opt-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:.85rem;color:#fff;letter-spacing:.02em}
    .opt-price{font-size:.6rem;color:rgba(255,255,255,.5);font-weight:600}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:8px}
    .cta{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:.3em;text-transform:uppercase;text-align:center}
    .cta strong{color:#1870b8}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg-left"></div>
    <div class="bg-right"></div>
    <div class="ov"></div>
    <div class="split-line"></div>
    <div class="vs">VS</div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="middle">
        <div class="label">🔥 You decide</div>
        <div class="question">What's your<br/>go-to?</div>
        <div class="options">
          <div class="opt opt-a">
            <div class="opt-icon">🍔</div>
            <div class="opt-name">Burger</div>
            <div class="opt-price">From $6.00</div>
          </div>
          <div class="opt opt-b">
            <div class="opt-icon">🥪</div>
            <div class="opt-name">Sandwich</div>
            <div class="opt-price">From $6.00</div>
          </div>
        </div>
      </div>
      <div class="bottom">
        <div class="cta">Comment below 👇 or order both at<br/><strong>mayelrestaurant.vercel.app</strong></div>
      </div>
    </div>
  </div>
</body>
</html>
