<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel Story 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/burger.jpg');background-size:cover;background-position:center 55%}
    .ov1{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,7,15,.9) 0%,rgba(6,7,15,.15) 35%,rgba(6,7,15,.15) 55%,rgba(6,7,15,.95) 100%)}
    .ov2{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(24,112,184,.1) 0%,transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:44px 32px 40px}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.6rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px}
    .badge{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);border-radius:100px;padding:6px 20px;color:#c9a84c;font-size:.55rem;font-weight:700;letter-spacing:.4em;text-transform:uppercase}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.6rem;color:#fff;line-height:1;letter-spacing:-.02em}
    .item-name{font-family:'Playfair Display',serif;font-style:italic;font-size:1.5rem;color:#fff;opacity:.9}
    .price{font-family:'Raleway',sans-serif;font-weight:900;font-size:2rem;color:#1870b8}
    .desc{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.6;max-width:240px}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .cta{font-size:.5rem;color:rgba(255,255,255,.35);letter-spacing:.4em;text-transform:uppercase}
    .poll{display:flex;gap:10px;width:100%}
    .poll-btn{flex:1;padding:14px 0;border-radius:100px;text-align:center;font-family:'Raleway',sans-serif;font-weight:800;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase}
    .poll-yes{background:#1870b8;color:#fff}
    .poll-no{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6)}
    .tag{font-size:.5rem;color:rgba(255,255,255,.25);letter-spacing:.4em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov1"></div>
    <div class="ov2"></div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="middle">
        <div class="badge">⭐ Today's Pick</div>
        <div class="title">Item of<br/>the Day</div>
        <div class="item-name">BBQ Philly Chicken</div>
        <div class="price">$7.00</div>
        <div class="desc">Chicken · Pepper · Onion · BBQ · Mozzarella · Pickles · Mayo · Iceberg</div>
      </div>
      <div class="bottom">
        <div class="cta">Would you try it?</div>
        <div class="poll">
          <div class="poll-btn poll-yes">Yes 🔥</div>
          <div class="poll-btn poll-no">Maybe later</div>
        </div>
        <div class="tag">Order · Eat · Repeat</div>
      </div>
    </div>
  </div>
</body>
</html>
