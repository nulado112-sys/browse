<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Fresh Bowl</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/bowl.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.75) 0%,rgba(6,7,15,.05) 40%,rgba(6,7,15,.2) 65%,rgba(6,7,15,.93) 100%)}
    .green-glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 50%, rgba(34,139,34,0.08) 0%, transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 32px 50px;z-index:1}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#228b22}
    .bottom{display:flex;flex-direction:column;align-items:flex-start;gap:12px;width:100%}
    .eyebrow{font-size:.5rem;color:#228b22;letter-spacing:.4em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.4rem;color:#fff;line-height:.88;letter-spacing:-.03em}
    .title span{color:#228b22}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:rgba(255,255,255,.65);line-height:1.4;margin-top:6px}
    .features{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .feature{background:rgba(34,139,34,.1);border:1px solid rgba(34,139,34,.25);border-radius:100px;padding:5px 12px;font-size:.45rem;color:rgba(34,139,34,.85);font-weight:600}
    .price{font-family:'Raleway',sans-serif;font-weight:800;font-size:1rem;color:#228b22;margin-top:8px}
    .url{font-family:'Raleway',sans-serif;font-weight:600;font-size:.55rem;color:rgba(255,255,255,.5);margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="green-glow"></div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="bottom">
        <div class="eyebrow">🥗 Fresh & Healthy</div>
        <div class="title">FRESH<br/><span>FUEL</span><br/>DAILY</div>
        <div class="sub">Nutritious bowls packed with fresh ingredients.<br/>Guilt-free indulgence, maximum flavor.</div>
        <div class="features">
          <div class="feature">Farm Fresh</div>
          <div class="feature">High Protein</div>
          <div class="feature">Low Carb</div>
        </div>
        <div class="price">From $6.50</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
