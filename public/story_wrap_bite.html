<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Wrap Attack</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/wrap_bite.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.78) 0%,rgba(6,7,15,.05) 35%,rgba(6,7,15,.25) 65%,rgba(6,7,15,.95) 100%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 30px 50px;z-index:1}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#32cd32}
    .bottom{display:flex;flex-direction:column;align-items:flex-start;gap:12px;width:100%}
    .eyebrow{font-size:.5rem;color:#32cd32;letter-spacing:.4em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.4rem;color:#fff;line-height:.88;letter-spacing:-.03em}
    .title span{color:#32cd32}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:rgba(255,255,255,.65);line-height:1.4;margin-top:6px}
    .features{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .feature{background:rgba(50,205,50,.1);border:1px solid rgba(50,205,50,.25);border-radius:100px;padding:5px 12px;font-size:.45rem;color:rgba(50,205,50,.85);font-weight:600}
    .price{font-family:'Raleway',sans-serif;font-weight:800;font-size:1rem;color:#32cd32;margin-top:8px}
    .url{font-family:'Raleway',sans-serif;font-weight:600;font-size:.55rem;color:rgba(255,255,255,.5);margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="bottom">
        <div class="eyebrow">🌯 Fresh Wraps</div>
        <div class="title">WRAP<br/><span>IT</span><br/>RIGHT</div>
        <div class="sub">Fresh tortilla packed with crispy chicken,<br/>vegetables and our signature sauce.</div>
        <div class="features">
          <div class="feature">Crispy Chicken</div>
          <div class="feature">Fresh Veggies</div>
          <div class="feature">Signature Sauce</div>
        </div>
        <div class="price">$7.00</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
