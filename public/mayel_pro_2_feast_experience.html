<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayel - The Feast Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:wght@100;200;300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes slideInFromLeft {
            0% { transform: translateX(-100px) opacity(0); }
            100% { transform: translateX(0) opacity(1); }
        }
        
        @keyframes slideInFromRight {
            0% { transform: translateX(100px) opacity(0); }
            100% { transform: translateX(0) opacity(1); }
        }
        
        @keyframes fadeInUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        .post {
            width: 1080px;
            height: 1080px;
            position: relative;
            background: 
                conic-gradient(from 180deg at 50% 50%, rgba(21, 101, 192, 0.1) 0deg, rgba(255, 215, 0, 0.05) 120deg, rgba(21, 101, 192, 0.1) 240deg, rgba(255, 215, 0, 0.05) 360deg),
                linear-gradient(125deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 40%, rgba(0, 0, 0, 0.7) 80%, rgba(0, 0, 0, 0.9) 100%),
                url('images/flatlay1.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay, multiply, normal;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(21, 101, 192, 0.15) 0%, transparent 50%);
            z-index: 1;
        }
        
        .post::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M20 20c0 11.046-8.954 20-20 20s-20-8.954-20-20 8.954-20 20-20 20 8.954 20 20zm-20-10c-5.523 0-10 4.477-10 10s4.477 10 10 10 10-4.477 10-10-4.477-10-10-10z'/%3E%3C/g%3E%3C/svg%3E");
            z-index: 2;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
        }
        
        .header-section {
            padding: 60px 60px 20px;
            position: relative;
            text-align: center;
        }
        
        .experience-tag {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 16px;
            color: rgba(255, 215, 0, 0.8);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            animation: fadeInUp 1s ease-out 0.5s both;
        }
        
        .experience-tag::before,
        .experience-tag::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.8), transparent);
        }
        
        .experience-tag::before {
            left: -60px;
        }
        
        .experience-tag::after {
            right: -60px;
        }
        
        .logo {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 48px;
            letter-spacing: -1px;
            color: white;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
            animation: slideInFromLeft 1s ease-out both;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .logo .y {
            color: #1565C0;
            font-weight: 900;
        }
        
        .brand-underline {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, #1565C0 0%, rgba(255, 215, 0, 0.8) 50%, #1565C0 100%);
            margin: 0 auto 40px;
            border-radius: 2px;
            position: relative;
            animation: slideInFromRight 1s ease-out 0.3s both;
        }
        
        .brand-underline::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(90deg, #1565C0, rgba(255, 215, 0, 0.8), #1565C0);
            border-radius: 4px;
            filter: blur(4px);
            opacity: 0.5;
            z-index: -1;
        }
        
        .main-content {
            text-align: center;
            position: relative;
            padding: 40px 60px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .headline-container {
            position: relative;
            margin-bottom: 50px;
        }
        
        .headline {
            font-family: 'Raleway', sans-serif;
            font-weight: 900;
            font-size: 95px;
            line-height: 0.8;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            animation: fadeInUp 1s ease-out 0.7s both;
        }
        
        .headline-word {
            display: block;
            position: relative;
            margin-bottom: 10px;
        }
        
        .headline-word.word-1 {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .headline-word.word-2 {
            background: linear-gradient(135deg, #1565C0 0%, #42a5f5 50%, #1e88e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(21, 101, 192, 0.5);
        }
        
        .headline-word.word-3 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }
        
        .headline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(21, 101, 192, 0.1) 0%, transparent 70%);
            z-index: -1;
            animation: pulse 4s ease-in-out infinite;
        }
        
        .description {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 26px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.4;
            max-width: 800px;
            margin: 0 auto 40px;
            position: relative;
            animation: fadeInUp 1s ease-out 0.9s both;
        }
        
        .menu-categories {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
            animation: fadeInUp 1s ease-out 1.1s both;
        }
        
        .category-pill {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 12px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            transition: all 0.3s ease;
        }
        
        .category-pill:hover {
            transform: translateY(-2px);
            background: rgba(21, 101, 192, 0.2);
            border-color: rgba(21, 101, 192, 0.4);
            color: white;
        }
        
        .category-pill::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            border-radius: 25px;
            z-index: -1;
        }
        
        .footer-section {
            padding: 20px 60px 60px;
            position: relative;
            text-align: center;
        }
        
        .footer-divider {
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 0 auto 30px;
            position: relative;
        }
        
        .footer-divider::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -3px;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: rgba(255, 215, 0, 0.8);
            border-radius: 50%;
        }
        
        .tagline {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out 1.3s both;
        }
        
        .website {
            font-family: 'Raleway', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #1565C0 0%, #42a5f5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            animation: fadeInUp 1s ease-out 1.5s both;
        }
        
        .website::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #1565C0, transparent);
            border-radius: 1px;
        }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            pointer-events: none;
        }
        
        .floating-element {
            position: absolute;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        
        .floating-1 {
            top: 15%;
            left: 10%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
        }
        
        .floating-2 {
            top: 30%;
            right: 8%;
            width: 40px;
            height: 40px;
            animation-delay: 2s;
        }
        
        .floating-3 {
            bottom: 25%;
            left: 15%;
            width: 80px;
            height: 80px;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            25% { transform: translateY(-20px) rotate(90deg); opacity: 0.6; }
            50% { transform: translateY(-10px) rotate(180deg); opacity: 0.4; }
            75% { transform: translateY(-30px) rotate(270deg); opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="floating-elements">
            <div class="floating-element floating-1"></div>
            <div class="floating-element floating-2"></div>
            <div class="floating-element floating-3"></div>
        </div>
        
        <div class="content-wrapper">
            <div class="header-section">
                <div class="experience-tag">The Full Experience</div>
                <div class="logo">MA<span class="y">Y</span>EL</div>
                <div class="brand-underline"></div>
            </div>
            
            <div class="main-content">
                <div class="headline-container">
                    <div class="headline">
                        <span class="headline-word word-1">EVERY</span>
                        <span class="headline-word word-2">THING</span>
                        <span class="headline-word word-3">ON THE TABLE.</span>
                    </div>
                </div>
                
                <div class="description">
                    Burgers • Sandwiches • Wraps<br>
                    Kaaek • Platters • Desserts
                </div>
                
                <div class="menu-categories">
                    <div class="category-pill">50+ Items</div>
                    <div class="category-pill">100% Fresh Daily</div>
                    <div class="category-pill">Since 2018</div>
                </div>
            </div>
            
            <div class="footer-section">
                <div class="footer-divider"></div>
                <div class="tagline">ORDER • EAT • REPEAT</div>
                <div class="website">mayelb.com</div>
            </div>
        </div>
    </div>
</body>
</html>
