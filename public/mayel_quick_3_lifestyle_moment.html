<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayel - Lifestyle Moment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@100;200;300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .post {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('images/lifestyle1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            color: white;
            position: relative;
        }
        
        .logo {
            font-family: 'Raleway', sans-serif;
            font-size: 40px;
            color: white;
            text-align: center;
            font-weight: 900;
        }
        .logo .y { color: #1565C0; }
        
        .main {
            text-align: center;
        }
        
        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            color: white;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 0.9;
        }
        
        .sub {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: rgba(255,255,255,0.9);
            font-style: italic;
        }
        
        .footer {
            text-align: center;
        }
        
        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 15px;
        }
        
        .website {
            font-family: 'Raleway', sans-serif;
            font-size: 20px;
            color: #1565C0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="logo">MA<span class="y">Y</span>EL</div>
        <div class="main">
            <div class="headline">GOOD<br>MOMENTS</div>
            <div class="sub">Start with great food</div>
        </div>
        <div class="footer">
            <div class="tagline">ORDER • EAT • REPEAT</div>
            <div class="website">mayelb.com</div>
        </div>
    </div>
</body>
</html>
