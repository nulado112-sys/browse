<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Lifestyle Vibes</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/chair_burger.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.8) 0%,rgba(6,7,15,.05) 35%,rgba(6,7,15,.25) 65%,rgba(6,7,15,.94) 100%)}
    .lifestyle-glow{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 50%, rgba(72,61,139,0.06) 0%, transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:50px 30px 48px;z-index:1}
    .top{display:flex;flex-direction:column;align-items:center;gap:6px}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#483d8b}
    .middle{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;margin-top:50px}
    .badge{background:rgba(72,61,139,.15);border:1px solid rgba(72,61,139,.3);border-radius:100px;padding:8px 18px;font-size:.5rem;color:#483d8b;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.4rem;color:#fff;line-height:.9;letter-spacing:-.02em}
    .title span{color:#483d8b}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;color:rgba(255,255,255,.65);line-height:1.4;max-width:260px}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .cta{background:rgba(72,61,139,.2);border:1px solid rgba(72,61,139,.4);border-radius:100px;padding:12px 24px;font-family:'Raleway',sans-serif;font-weight:700;font-size:.6rem;color:#483d8b;letter-spacing:.03em;width:100%;text-align:center}
    .url{font-size:.5rem;color:rgba(255,255,255,.4);margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="lifestyle-glow"></div>
    <div class="content">
      <div class="top">
        <div class="logo">MA<span>Y</span>EL</div>
      </div>
      <div class="middle">
        <div class="badge">📸 Lifestyle</div>
        <div class="title">LIVE<br/>THE<br/><span>MOMENT</span></div>
        <div class="sub">Good food, great vibes, perfect moments.<br/>This is the Mayel lifestyle.</div>
      </div>
      <div class="bottom">
        <div class="cta">Join The Lifestyle</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
