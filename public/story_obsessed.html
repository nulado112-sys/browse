<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Obsessed</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/face_burger.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.65) 0%,rgba(6,7,15,.05) 30%,rgba(6,7,15,.05) 55%,rgba(6,7,15,.92) 100%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}

    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}

    .bottom-block{display:flex;flex-direction:column;align-items:flex-start;gap:10px;width:100%}
    .eyebrow{font-size:.48rem;color:rgba(255,255,255,.35);letter-spacing:.45em;text-transform:uppercase;font-weight:600}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:4.2rem;color:#fff;line-height:.88;letter-spacing:-.04em}
    .title span{color:#1870b8}
    .body{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.5);line-height:1.4;max-width:220px}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.65rem;color:#1870b8;margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="content">

      <div class="logo">MA<span>Y</span>EL</div>

      <div class="bottom-block">
        <div class="eyebrow">Can't stop</div>
        <div class="title">OB<span>S</span>ES<br/>SED.</div>
        <div class="body">You know who you are. Tag someone who'd hide their face too.</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>

    </div>
  </div>
</body>
</html>
