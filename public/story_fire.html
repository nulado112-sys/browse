<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Cooked on Real Fire</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/grill_fire.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.7) 0%,rgba(6,7,15,.15) 40%,rgba(6,7,15,.7) 75%,rgba(6,7,15,.97) 100%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}

    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}

    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
    .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:100px;padding:6px 14px;font-size:.5rem;color:#c9a84c;letter-spacing:.3em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.8rem;color:#fff;line-height:.95;letter-spacing:-.02em;text-align:center}
    .title em{color:#c9a84c;font-style:normal}
    .desc{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(255,255,255,.55);line-height:1.5;max-width:260px}

    .divider{display:flex;align-items:center;gap:12px;width:100%;margin-top:8px}
    .div-line{height:1px;flex:1;background:rgba(255,255,255,.08)}
    .div-text{font-size:.45rem;color:rgba(255,255,255,.2);letter-spacing:.35em;text-transform:uppercase}

    .bottom{display:flex;flex-direction:column;align-items:center;gap:6px}
    .cta-text{font-size:.5rem;color:rgba(255,255,255,.3);letter-spacing:.3em;text-transform:uppercase;text-align:center}
    .cta-url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.65rem;color:#1870b8;letter-spacing:.05em}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="content">

      <div class="logo">MA<span>Y</span>EL</div>

      <div class="middle">
        <div class="badge">🔥 100% Fresh</div>
        <div class="title">COOKED ON<br/><em>REAL FIRE</em></div>
        <div class="desc">Every patty, grilled fresh to order. No shortcuts. No freezers.</div>
        <div class="divider">
          <div class="div-line"></div>
          <div class="div-text">Since 2018</div>
          <div class="div-line"></div>
        </div>
      </div>

      <div class="bottom">
        <div class="cta-text">Order online at</div>
        <div class="cta-url">mayelrestaurant.vercel.app</div>
      </div>

    </div>
  </div>
</body>
</html>
