<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Full Spread</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/full_spread.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.65) 0%,rgba(6,7,15,.1) 30%,rgba(6,7,15,.3) 65%,rgba(6,7,15,.97) 100%)}
    .gold-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#c9a84c,transparent)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .bottom{display:flex;flex-direction:column;align-items:flex-start;gap:10px;width:100%}
    .eyebrow{font-size:.48rem;color:#1870b8;letter-spacing:.5em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.4rem;color:#fff;line-height:.9;letter-spacing:-.03em}
    .title span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:rgba(255,255,255,.55);line-height:1.5}
    .items{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
    .item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:5px 12px;font-size:.48rem;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.06em}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.6rem;color:#1870b8;margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="gold-line"></div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="bottom">
        <div class="eyebrow">The Full Menu</div>
        <div class="title">ONE<br/>TABLE.<br/><span>EVERY<br/>THING.</span></div>
        <div class="sub">Burger · Sandwich · Kaaek<br/>Fries · Tenders · Your drink.</div>
        <div class="items">
          <div class="item">50+ Items</div>
          <div class="item">100% Fresh Daily</div>
          <div class="item">Since 2018</div>
        </div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
