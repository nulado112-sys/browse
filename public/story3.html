<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel Story 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/chef.jpg');background-size:cover;background-position:center top}
    .ov1{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,7,15,.97) 0%,rgba(6,7,15,.4) 40%,rgba(6,7,15,.6) 70%,rgba(6,7,15,.98) 100%)}
    .stars{position:absolute;inset:0;overflow:hidden}
    .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.4}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:44px 32px 44px}
    .top{display:flex;flex-direction:column;align-items:center;gap:8px}
    .moon{font-size:2.5rem;line-height:1}
    .time{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.5rem;color:#fff;letter-spacing:-.03em;line-height:1}
    .time-label{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:.4em;text-transform:uppercase}
    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
    .headline{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.2rem;color:#fff;line-height:1.05;letter-spacing:-.01em}
    .headline span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(255,255,255,.6);line-height:1.5}
    .hours{display:flex;flex-direction:column;gap:6px;width:100%}
    .hour-row{display:flex;justify-content:space-between;padding:10px 16px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
    .hour-day{font-size:.7rem;color:rgba(255,255,255,.5)}
    .hour-time{font-size:.7rem;color:#fff;font-weight:600}
    .hour-time.late{color:#1870b8}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:8px}
    .open-badge{display:flex;align-items:center;gap:8px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);border-radius:100px;padding:10px 20px}
    .dot{width:8px;height:8px;border-radius:50%;background:#25D366;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .open-text{font-size:.7rem;color:#25D366;font-weight:600;letter-spacing:.1em}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.1rem;color:rgba(255,255,255,.3);letter-spacing:.02em}
    .logo span{color:#1870b8}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov1"></div>
    <div class="content">
      <div class="top">
        <div class="moon">🌙</div>
        <div class="time">3 AM</div>
        <div class="time-label">We close at</div>
      </div>
      <div class="middle">
        <div class="headline">Still<br/><span>hungry?</span></div>
        <div class="sub">We're open late — every night.<br/>Order now & we'll handle the rest.</div>
        <div class="hours">
          <div class="hour-row">
            <span class="hour-day">Mon – Fri</span>
            <span class="hour-time late">12PM – 3AM</span>
          </div>
          <div class="hour-row">
            <span class="hour-day">Saturday</span>
            <span class="hour-time late">12PM – 4AM</span>
          </div>
          <div class="hour-row">
            <span class="hour-day">Sunday</span>
            <span class="hour-time late">5PM – 3AM</span>
          </div>
        </div>
      </div>
      <div class="bottom">
        <div class="open-badge">
          <div class="dot"></div>
          <span class="open-text">Open Now — Order on WhatsApp</span>
        </div>
        <div class="logo">MA<span>Y</span>EL</div>
      </div>
    </div>
  </div>
</body>
</html>
