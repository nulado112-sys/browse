<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Come Get Yours</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/girl_chair.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.55) 0%,rgba(6,7,15,.05) 30%,rgba(6,7,15,.05) 58%,rgba(6,7,15,.95) 100%)}
    .blue-glow{position:absolute;bottom:0;left:0;right:0;height:45%;background:radial-gradient(ellipse 90% 60% at 50% 100%,rgba(24,112,184,.2) 0%,transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em;align-self:flex-start}
    .logo span{color:#1870b8}
    .bottom{display:flex;flex-direction:column;align-items:flex-start;gap:10px;width:100%}
    .eyebrow{font-size:.48rem;color:rgba(255,255,255,.35);letter-spacing:.5em;text-transform:uppercase;font-weight:600}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:4rem;color:#fff;line-height:.88;letter-spacing:-.04em}
    .title span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.5);line-height:1.4}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.6rem;color:#1870b8;margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="blue-glow"></div>
    <div class="content">
      <div class="logo">MA<span>Y</span>EL</div>
      <div class="bottom">
        <div class="eyebrow">What are you waiting for?</div>
        <div class="title">COME<br/>GET<br/><span>YOURS.</span></div>
        <div class="sub">Order online. Pick up hot.<br/>No waiting, no excuses.</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
