<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayel - Date Night Done Right</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:wght@100;200;300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(1deg); }
            50% { transform: translateY(-5px) rotate(0deg); }
            75% { transform: translateY(-15px) rotate(-1deg); }
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(21, 101, 192, 0.3)); }
            50% { filter: drop-shadow(0 0 30px rgba(21, 101, 192, 0.6)); }
        }
        
        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 2px 2px 4px rgba(0,0,0,0.8); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.7), 2px 2px 4px rgba(0,0,0,0.8); }
        }
        
        .post {
            width: 1080px;
            height: 1080px;
            position: relative;
            background: 
                radial-gradient(circle at 30% 70%, rgba(21, 101, 192, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('images/burger1.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay, overlay, multiply, normal;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 1080 1080' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }
        
        .geometric-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
        }
        
        .geometric-shape {
            position: absolute;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .shape-1 {
            top: 100px;
            left: 80px;
            width: 120px;
            height: 120px;
            transform: rotate(45deg);
            animation: float 8s ease-in-out infinite;
        }
        
        .shape-2 {
            bottom: 150px;
            right: 100px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite reverse;
        }
        
        .shape-3 {
            top: 200px;
            right: 150px;
            width: 60px;
            height: 60px;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background: rgba(21, 101, 192, 0.1);
            animation: float 7s ease-in-out infinite;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
        }
        
        .header-section {
            text-align: center;
            position: relative;
        }
        
        .logo {
            font-family: 'Raleway', sans-serif;
            font-weight: 900;
            font-size: 52px;
            letter-spacing: -3px;
            color: white;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
            animation: glow 4s ease-in-out infinite;
        }
        
        .logo .y {
            color: #1565C0;
            position: relative;
        }
        
        .logo::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.1), rgba(21, 101, 192, 0.1));
            border-radius: 10px;
            z-index: -1;
            filter: blur(20px);
        }
        
        .premium-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.8), transparent);
            margin: 0 auto 30px;
            position: relative;
        }
        
        .premium-line::before,
        .premium-line::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            top: -3px;
        }
        
        .premium-line::before {
            left: -15px;
        }
        
        .premium-line::after {
            right: -15px;
        }
        
        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 20px;
            color: rgba(255, 215, 0, 0.9);
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            animation: textGlow 3s ease-in-out infinite;
        }
        
        .main-content {
            text-align: center;
            position: relative;
            margin-top: 80px;
            margin-bottom: 80px;
        }
        
        .headline {
            font-family: 'Raleway', sans-serif;
            font-weight: 900;
            font-size: 85px;
            line-height: 0.85;
            color: white;
            text-transform: uppercase;
            margin-bottom: 40px;
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.9));
        }
        
        .headline .blue {
            background: linear-gradient(135deg, #1565C0 0%, #42a5f5 50%, #1565C0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .headline::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(21, 101, 192, 0.8), transparent);
            border-radius: 2px;
        }
        
        .description {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.3;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }
        
        .description::before,
        .description::after {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            color: rgba(255, 215, 0, 0.4);
            position: absolute;
            line-height: 1;
        }
        
        .description::before {
            left: -40px;
            top: -10px;
        }
        
        .description::after {
            right: -40px;
            bottom: -30px;
            transform: rotate(180deg);
        }
        
        .footer-section {
            position: relative;
            text-align: center;
        }
        
        .tagline-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 16px 40px;
            margin-bottom: 30px;
            display: inline-block;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            position: relative;
        }
        
        .website-container {
            position: relative;
        }
        
        .website {
            font-family: 'Raleway', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #1565C0;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }
        
        .website::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #1565C0, transparent);
            animation: glow 3s ease-in-out infinite;
        }
        
        .corner-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            pointer-events: none;
        }
        
        .corner-accent {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.05), transparent);
        }
        
        .corner-accent.top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
            clip-path: polygon(0 0, 70% 0, 70% 2px, 2px 2px, 2px 70%, 0 70%);
        }
        
        .corner-accent.bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
            clip-path: polygon(30% 100%, 100% 100%, 100% 30%, 98% 30%, 98% 98%, 30% 98%);
        }
        
        .side-accent {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 200px;
            background: linear-gradient(0deg, transparent, rgba(21, 101, 192, 0.6), transparent);
            border-radius: 2px;
        }
        
        .side-accent::before,
        .side-accent::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(21, 101, 192, 0.4);
            border-radius: 50%;
            left: -4.5px;
        }
        
        .side-accent::before {
            top: -6px;
        }
        
        .side-accent::after {
            bottom: -6px;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="geometric-bg">
            <div class="geometric-shape shape-1"></div>
            <div class="geometric-shape shape-2"></div>
            <div class="geometric-shape shape-3"></div>
        </div>
        
        <div class="corner-elements">
            <div class="corner-accent top-left"></div>
            <div class="corner-accent bottom-right"></div>
            <div class="side-accent"></div>
        </div>
        
        <div class="content-wrapper">
            <div class="header-section">
                <div class="logo">MA<span class="y">Y</span>EL</div>
                <div class="premium-line"></div>
                <div class="subtitle">Good Food</div>
            </div>
            
            <div class="main-content">
                <div class="headline">
                    DATE<br>
                    NIGHT<br>
                    <span class="blue">DONE<br>
                    RIGHT.</span>
                </div>
                
                <div class="description">
                    Food hits different when you share it.
                </div>
            </div>
            
            <div class="footer-section">
                <div class="tagline-container">
                    <div class="tagline">ORDER • EAT • REPEAT</div>
                </div>
                <div class="website-container">
                    <div class="website">mayelb.com</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
