<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Date Night Vibes</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/couple_eating.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.85) 0%,rgba(6,7,15,.1) 35%,rgba(6,7,15,.3) 65%,rgba(6,7,15,.95) 100%)}
    .warm-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 50%, rgba(139,69,19,0.06) 0%, transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:52px 30px 48px;z-index:1}
    .top{display:flex;flex-direction:column;align-items:center;gap:8px}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#8b4513}
    .tag{font-size:.42rem;color:rgba(139,69,19,.7);letter-spacing:.4em;text-transform:uppercase;font-weight:600}
    .middle{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;margin-top:50px}
    .badge{background:rgba(139,69,19,.15);border:1px solid rgba(139,69,19,.3);border-radius:100px;padding:8px 18px;font-size:.5rem;color:#8b4513;font-weight:700;letter-spacing:.15em}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.4rem;color:#fff;line-height:.95;letter-spacing:-.02em}
    .title span{color:#8b4513}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.7);line-height:1.4;max-width:260px}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .cta{background:rgba(139,69,19,.2);border:1px solid rgba(139,69,19,.4);border-radius:100px;padding:12px 24px;font-family:'Raleway',sans-serif;font-weight:700;font-size:.6rem;color:#8b4513;letter-spacing:.03em;width:100%;text-align:center}
    .url{font-size:.5rem;color:rgba(255,255,255,.4)}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="warm-glow"></div>
    <div class="content">
      <div class="top">
        <div class="logo">MA<span>Y</span>EL</div>
        <div class="tag">Where Moments Happen</div>
      </div>
      <div class="middle">
        <div class="badge">💕 Date Night</div>
        <div class="title">SHARING<br/><span>GOOD</span><br/>MOMENTS</div>
        <div class="sub">Great food brings people together.<br/>Create memories over every meal.</div>
      </div>
      <div class="bottom">
        <div class="cta">Book Your Table Today</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
