<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayel - Sandwich Hero Post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .instagram-post {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(45deg, #FF6B35 0%, #F7931E 50%, #FFD23F 100%);
            position: relative;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .background-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, 
                    transparent, 
                    transparent 20px, 
                    rgba(255,255,255,0.05) 20px, 
                    rgba(255,255,255,0.05) 40px);
        }
        
        .content-wrapper {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 50px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }
        
        .logo-compact {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .logo-text {
            color: white;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        
        .arabic-accent {
            color: white;
            font-size: 24px;
            opacity: 0.8;
        }
        
        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .hero-badge {
            background: rgba(255,255,255,0.9);
            color: #FF6B35;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .hero-title {
            color: white;
            font-size: 64px;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 20px;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.4);
        }
        
        .hero-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 40px;
            max-width: 600px;
        }
        
        .sandwich-highlight {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 40px;
        }
        
        .sandwich-name {
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .sandwich-description {
            color: rgba(255,255,255,0.9);
            font-size: 20px;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        
        .price-tag {
            background: white;
            color: #FF6B35;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 28px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .bottom-cta {
            text-align: center;
        }
        
        .cta-text {
            color: white;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        
        .flame-decoration {
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            z-index: 1;
        }
        
        .flame-1 { top: 100px; left: 50px; transform: rotate(-20deg); }
        .flame-2 { top: 200px; right: 80px; transform: rotate(25deg); }
        .flame-3 { bottom: 150px; left: 100px; transform: rotate(-15deg); }
        .flame-4 { bottom: 50px; right: 50px; transform: rotate(10deg); }
    </style>
</head>
<body>
    <div class="instagram-post">
        <div class="background-texture"></div>
        
        <div class="flame-decoration flame-1">🔥</div>
        <div class="flame-decoration flame-2">🍔</div>
        <div class="flame-decoration flame-3">✨</div>
        <div class="flame-decoration flame-4">🔥</div>
        
        <div class="content-wrapper">
            <div class="header">
                <div class="logo-compact">
                    <div class="arabic-accent">و</div>
                    <div class="logo-text">MAYEL</div>
                </div>
            </div>
            
            <div class="main-hero">
                <div class="hero-badge">New Item Alert!</div>
                
                <h1 class="hero-title">
                    SANDWICH<br>
                    PERFECTION
                </h1>
                
                <p class="hero-subtitle">
                    Crafted with precision, served with passion
                </p>
                
                <div class="sandwich-highlight">
                    <div class="sandwich-name">Z Honey Chick</div>
                    <div class="sandwich-description">
                        Grilled Chicken • Rocca • Tomato<br>
                        Pickles • Honey Mustard Sauce
                    </div>
                    <div class="price-tag">$7</div>
                </div>
                
                <div class="bottom-cta">
                    <div class="cta-text">ORDER • EAT • REPEAT</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
