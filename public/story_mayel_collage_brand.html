<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Brand Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/mayel_collage.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.75) 0%,rgba(6,7,15,.1) 35%,rgba(6,7,15,.2) 65%,rgba(6,7,15,.93) 100%)}
    .brand-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(24,112,184,0.1) 0%, transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 48px;z-index:1}
    .top{display:flex;flex-direction:column;align-items:center;gap:8px}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.8rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .tagline{font-size:.42rem;color:rgba(24,112,184,.7);letter-spacing:.4em;text-transform:uppercase;font-weight:600}
    .middle{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;margin-top:40px}
    .badge{background:rgba(24,112,184,.15);border:1px solid rgba(24,112,184,.3);border-radius:100px;padding:8px 18px;font-size:.5rem;color:#1870b8;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.6rem;color:#fff;line-height:.9;letter-spacing:-.02em}
    .title span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.7);line-height:1.4;max-width:280px}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .cta{background:rgba(24,112,184,.2);border:1px solid rgba(24,112,184,.4);border-radius:100px;padding:12px 24px;font-family:'Raleway',sans-serif;font-weight:700;font-size:.6rem;color:#1870b8;letter-spacing:.03em;width:100%;text-align:center}
    .url{font-size:.5rem;color:rgba(255,255,255,.4);margin-top:4px}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="brand-glow"></div>
    <div class="content">
      <div class="top">
        <div class="logo">MA<span>Y</span>EL</div>
        <div class="tagline">Order • Eat • Repeat</div>
      </div>
      <div class="middle">
        <div class="badge">✨ Our Story</div>
        <div class="title">THIS<br/>IS<br/><span>MAYEL</span></div>
        <div class="sub">Fresh ingredients, bold flavors,<br/>unforgettable moments. This is our story.</div>
      </div>
      <div class="bottom">
        <div class="cta">Experience Our Story</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
