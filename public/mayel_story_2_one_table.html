<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayel - One Table Everything</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:wght@100;200;300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(21, 101, 192, 0.3)); }
            50% { filter: drop-shadow(0 0 30px rgba(21, 101, 192, 0.6)); }
        }
        
        .post {
            width: 1080px;
            height: 1080px;
            position: relative;
            background: 
                linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0.9) 100%),
                url('images/flatlay1.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: multiply;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(21, 101, 192, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            z-index: 1;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .header-section {
            text-align: center;
            animation: fadeIn 1s ease-out both;
        }
        
        .logo {
            font-family: 'Raleway', sans-serif;
            font-weight: 900;
            font-size: 48px;
            letter-spacing: -2px;
            color: white;
            margin-bottom: 20px;
            animation: glow 3s ease-in-out infinite;
        }
        
        .logo .y {
            color: #1565C0;
        }
        
        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 18px;
            color: rgba(21, 101, 192, 0.9);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        
        .main-content {
            text-align: left;
            padding-left: 40px;
            animation: slideIn 1.2s ease-out 0.3s both;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .headline-container {
            position: relative;
            margin-bottom: 40px;
        }
        
        .headline-large {
            font-family: 'Raleway', sans-serif;
            font-weight: 900;
            font-size: 110px;
            line-height: 0.85;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
        }
        
        .headline-word {
            display: block;
            margin-bottom: 10px;
        }
        
        .word-1 {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.8));
        }
        
        .word-2 {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.8));
        }
        
        .word-3 {
            background: linear-gradient(135deg, #1565C0 0%, #42a5f5 50%, #1e88e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.8));
        }
        
        .word-4 {
            background: linear-gradient(135deg, #1565C0 0%, #42a5f5 50%, #1e88e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.8));
        }
        
        .description {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.4;
            margin-bottom: 30px;
            max-width: 600px;
        }
        
        .badges-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .badge {
            background: rgba(21, 101, 192, 0.1);
            border: 1px solid rgba(21, 101, 192, 0.3);
            border-radius: 25px;
            padding: 10px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(21, 101, 192, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .footer-section {
            text-align: center;
            animation: fadeIn 1s ease-out 0.6s both;
        }
        
        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }
        
        .website {
            font-family: 'Raleway', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #1565C0;
            letter-spacing: 1px;
        }
        
        .corner-accents {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            pointer-events: none;
        }
        
        .corner-accent {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(21, 101, 192, 0.4);
        }
        
        .corner-accent.top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-accent.bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="corner-accents">
            <div class="corner-accent top-left"></div>
            <div class="corner-accent bottom-right"></div>
        </div>
        
        <div class="content-wrapper">
            <div class="header-section">
                <div class="logo">MA<span class="y">Y</span>EL</div>
                <div class="subtitle">The Full Menu</div>
            </div>
            
            <div class="main-content">
                <div class="headline-container">
                    <div class="headline-large">
                        <span class="headline-word word-1">ONE</span>
                        <span class="headline-word word-2">TABLE.</span>
                        <span class="headline-word word-3">EVERY</span>
                        <span class="headline-word word-4">THING.</span>
                    </div>
                </div>
                
                <div class="description">
                    Burger • Sandwich • Kaaek<br>
                    Fries • Tenders • Your drink.
                </div>
                
                <div class="badges-container">
                    <div class="badge">50+ Items</div>
                    <div class="badge">100% Fresh Daily</div>
                    <div class="badge">Since 2018</div>
                </div>
            </div>
            
            <div class="footer-section">
                <div class="tagline">ORDER • EAT • REPEAT</div>
                <div class="website">mayelb.com</div>
            </div>
        </div>
    </div>
</body>
</html>
