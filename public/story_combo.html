<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Combo Add-On</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/flatlay2.jpg');background-size:cover;background-position:center top}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.55) 0%,rgba(6,7,15,.82) 50%,rgba(6,7,15,.95) 100%)}
    .gold-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#c9a84c,transparent)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:44px 24px 44px;z-index:1}

    /* top */
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}

    /* middle */
    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;width:100%}
    .eyebrow{font-size:.5rem;color:#c9a84c;letter-spacing:.55em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.6rem;color:#fff;line-height:.9;letter-spacing:-.03em}
    .title span{color:#1870b8}
    .subtitle{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:rgba(255,255,255,.6);line-height:1.4}
    .subtitle strong{color:rgba(255,255,255,.85);font-style:normal}

    /* items grid */
    .items{display:flex;gap:10px;justify-content:center;margin-top:4px}
    .item{display:flex;flex-direction:column;align-items:center;gap:5px}
    .icon-box{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
    .item-label{font-size:.42rem;color:rgba(255,255,255,.5);letter-spacing:.12em;text-transform:uppercase;font-weight:600}
    .sep{font-size:.9rem;color:rgba(255,255,255,.15);margin-bottom:18px;font-weight:300}

    /* price badge */
    .price-row{display:flex;align-items:center;gap:10px;margin-top:2px}
    .price-badge{background:linear-gradient(135deg,#1870b8,#0f4f85);border-radius:100px;padding:8px 20px;display:flex;align-items:baseline;gap:3px}
    .price-cur{font-family:'Raleway',sans-serif;font-weight:700;font-size:.85rem;color:rgba(255,255,255,.8)}
    .price-num{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.2rem;color:#fff;line-height:1;letter-spacing:-.04em}
    .price-only{font-size:.42rem;color:rgba(255,255,255,.35);letter-spacing:.35em;text-transform:uppercase}

    /* bottom */
    .bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .applies-label{font-size:.45rem;color:rgba(255,255,255,.3);letter-spacing:.3em;text-transform:uppercase}
    .tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .tag{background:rgba(24,112,184,.12);border:1px solid rgba(24,112,184,.35);border-radius:100px;padding:5px 12px;font-size:.52rem;color:rgba(24,112,184,.9);font-weight:600;letter-spacing:.05em}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="gold-line"></div>
    <div class="content">

      <div class="logo">MA<span>Y</span>EL</div>

      <div class="middle">
        <div class="eyebrow">✦ New Deal</div>
        <div class="title">COM<span>B</span>O<br/>ADD-ON</div>
        <div class="subtitle">Add to <strong>any sandwich</strong> — level up your meal</div>

        <div class="items">
          <div class="item">
            <div class="icon-box">🍟</div>
            <div class="item-label">Box Fries</div>
          </div>
          <div class="sep">+</div>
          <div class="item">
            <div class="icon-box">🍗</div>
            <div class="item-label">3 Tenders</div>
          </div>
          <div class="sep">+</div>
          <div class="item">
            <div class="icon-box">🥫</div>
            <div class="item-label">Sauce</div>
          </div>
          <div class="sep">+</div>
          <div class="item">
            <div class="icon-box">🥤</div>
            <div class="item-label">Soft Drink</div>
          </div>
        </div>

        <div class="price-row">
          <div class="price-badge">
            <div class="price-cur">+$</div>
            <div class="price-num">5</div>
          </div>
          <div class="price-only">Only · Add to order</div>
        </div>
      </div>

      <div class="bottom">
        <div class="applies-label">Applies to</div>
        <div class="tags">
          <div class="tag">🥪 Sandwiches</div>
          <div class="tag">🌯 Wraps</div>
          <div class="tag">🥖 Kaaek</div>
          <div class="tag">🥗 Salads</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
