<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayel - Platter Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@100;200;300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .post {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, rgba(21,101,192,0.3), rgba(0,0,0,0.8)), url('images/platter1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            color: white;
            position: relative;
        }
        
        .logo {
            font-family: 'Raleway', sans-serif;
            font-size: 40px;
            color: white;
            text-align: center;
            font-weight: 900;
        }
        .logo .y { color: #1565C0; }
        
        .main {
            text-align: left;
            padding-left: 40px;
        }
        
        .tag {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1565C0;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }
        
        .headline {
            font-family: 'Bebas Neue', cursive;
            font-size: 110px;
            color: white;
            line-height: 0.9;
            margin-bottom: 25px;
        }
        
        .sub {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            color: rgba(255,255,255,0.8);
        }
        
        .footer {
            text-align: center;
        }
        
        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 15px;
        }
        
        .website {
            font-family: 'Raleway', sans-serif;
            font-size: 20px;
            color: #1565C0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="logo">MA<span class="y">Y</span>EL</div>
        <div class="main">
            <div class="tag">SHARING TIME</div>
            <div class="headline">PLATTER<br>PARTY</div>
            <div class="sub">When you can't choose just one</div>
        </div>
        <div class="footer">
            <div class="tagline">ORDER • EAT • REPEAT</div>
            <div class="website">mayelb.com</div>
        </div>
    </div>
</body>
</html>
