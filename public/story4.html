<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel Story 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/waffle.jpg');background-size:cover;background-position:center 40%}
    .ov1{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,7,15,.88) 0%,rgba(6,7,15,.2) 40%,rgba(6,7,15,.2) 60%,rgba(6,7,15,.96) 100%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:44px 32px 40px}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:2rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .logo-tag{font-size:.45rem;color:rgba(24,112,184,.7);letter-spacing:.4em;text-transform:uppercase;font-weight:700}
    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px}
    .label{font-size:.55rem;color:#c9a84c;letter-spacing:.4em;text-transform:uppercase;font-weight:700}
    .headline{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.5rem;color:#fff;line-height:1.05;letter-spacing:-.01em}
    .headline span{color:#1870b8}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(255,255,255,.65);line-height:1.5;max-width:260px}
    .features{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .feat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:8px 16px;font-size:.6rem;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.1em}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
    .url{width:100%;padding:14px;background:rgba(24,112,184,.2);border:1px solid rgba(24,112,184,.4);border-radius:100px;text-align:center;font-family:'Raleway',sans-serif;font-weight:800;font-size:.85rem;color:#fff;letter-spacing:.05em}
    .cta-label{font-size:.5rem;color:rgba(255,255,255,.3);letter-spacing:.35em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov1"></div>
    <div class="content">
      <div class="logo-wrap">
        <div class="logo">MA<span>Y</span>EL</div>
        <div class="logo-tag">Order · Eat · Repeat</div>
      </div>
      <div class="middle">
        <div class="label">📲 Now Online</div>
        <div class="headline">Browse our<br/><span>full menu</span><br/>online</div>
        <div class="sub">Anytime. Anywhere.<br/>Pick your items & order on WhatsApp.</div>
        <div class="features">
          <div class="feat">🍔 Burgers</div>
          <div class="feat">🥪 Sandwiches</div>
          <div class="feat">🥖 Kaaek</div>
          <div class="feat">🧇 Desserts</div>
          <div class="feat">💨 Arguile</div>
        </div>
      </div>
      <div class="bottom">
        <div class="cta-label">Tap the link in bio or visit</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>
    </div>
  </div>
</body>
</html>
