<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Hold It Tight</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/hand_burger1.jpg');background-size:cover;background-position:center}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.6) 0%,rgba(6,7,15,.05) 35%,rgba(6,7,15,.05) 60%,rgba(6,7,15,.9) 100%)}
    .blue-glow{position:absolute;bottom:0;left:0;right:0;height:50%;background:radial-gradient(ellipse 90% 60% at 50% 100%,rgba(24,112,184,.22) 0%,transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}

    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em;align-self:flex-start}
    .logo span{color:#1870b8}

    .middle{display:flex;flex-direction:column;align-items:flex-start;gap:10px;width:100%}
    .eyebrow{font-size:.48rem;color:rgba(255,255,255,.4);letter-spacing:.45em;text-transform:uppercase;font-weight:600}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:4rem;color:#fff;line-height:.88;letter-spacing:-.04em}
    .title span{color:#1870b8}
    .tags{display:flex;gap:8px;margin-top:6px}
    .tag{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:5px 12px;font-size:.48rem;color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.08em}

    .bottom{display:flex;flex-direction:column;align-items:flex-start;gap:6px;width:100%}
    .cta-line{font-size:.5rem;color:rgba(255,255,255,.3);letter-spacing:.3em;text-transform:uppercase}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.65rem;color:#1870b8}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="blue-glow"></div>
    <div class="content">

      <div class="logo">MA<span>Y</span>EL</div>

      <div class="middle">
        <div class="eyebrow">The Burger</div>
        <div class="title">HOLD<br/>IT<br/><span>TIGHT.</span></div>
        <div class="tags">
          <div class="tag">Crispy</div>
          <div class="tag">Juicy</div>
          <div class="tag">Yours</div>
        </div>
      </div>

      <div class="bottom">
        <div class="cta-line">Order online at</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>

    </div>
  </div>
</body>
</html>
