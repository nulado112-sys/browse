<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – Cheesy Happiness</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/cheesy_chicken_fries.jpg');background-size:cover;background-position:center 30%}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.8) 0%,rgba(6,7,15,.05) 40%,rgba(6,7,15,.25) 70%,rgba(6,7,15,.96) 100%)}
    .warm-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 40%, rgba(255,140,0,0.06) 0%, transparent 70%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:50px 28px 50px;z-index:1}
    .top{display:flex;flex-direction:column;align-items:center;gap:6px}
    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.4rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}
    .tag{font-size:.42rem;color:rgba(201,168,76,.7);letter-spacing:.4em;text-transform:uppercase;font-weight:600}
    .middle{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;margin-top:60px}
    .emoji-badge{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:100px;padding:8px 16px;font-size:.48rem;color:#c9a84c;font-weight:700;letter-spacing:.2em;text-transform:uppercase}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:2.8rem;color:#fff;line-height:.95;letter-spacing:-.025em}
    .title span{color:#c9a84c}
    .sub{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.7);line-height:1.4;max-width:280px}
    .bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .price-row{display:flex;align-items:center;gap:12px}
    .price{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.2rem;color:#c9a84c}
    .price-label{font-size:.45rem;color:rgba(255,255,255,.5);letter-spacing:.2em;text-transform:uppercase}
    .cta{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);border-radius:100px;padding:12px 24px;font-family:'Raleway',sans-serif;font-weight:700;font-size:.6rem;color:#c9a84c;letter-spacing:.05em;text-align:center;width:100%}
    .corner-dots{position:absolute;top:20px;left:20px;display:flex;gap:4px}
    .dot{width:4px;height:4px;border-radius:50%;background:#ff8c00;opacity:.6}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="warm-glow"></div>
    <div class="corner-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="content">
      <div class="top">
        <div class="logo">MA<span>Y</span>EL</div>
        <div class="tag">Loaded • Cheesy • Irresistible</div>
      </div>
      <div class="middle">
        <div class="emoji-badge">🧀 Pure Happiness</div>
        <div class="title">PURE<br/><span>CHEESY</span><br/>JOY</div>
        <div class="sub">When hunger meets happiness.<br/>Loaded with cheese, chicken & pure satisfaction.</div>
      </div>
      <div class="bottom">
        <div class="price-row">
          <span class="price-label">Only</span>
          <span class="price">$4.50</span>
        </div>
        <div class="cta">Order Your Happiness Now</div>
      </div>
    </div>
  </div>
</body>
</html>
