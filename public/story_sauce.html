<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayel – The Sauce</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center}
    .story{position:relative;width:390px;height:692px;overflow:hidden;border-radius:16px}
    .bg{position:absolute;inset:0;background-image:url('/images/tender_sauce.jpg');background-size:cover;background-position:center 30%}
    .ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,7,15,.75) 0%,rgba(6,7,15,.1) 35%,rgba(6,7,15,.65) 70%,rgba(6,7,15,.97) 100%)}
    .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:48px 28px 52px;z-index:1}

    .logo{font-family:'Raleway',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .logo span{color:#1870b8}

    .middle{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px}
    .eyebrow{font-size:.5rem;color:#c9a84c;letter-spacing:.5em;text-transform:uppercase;font-weight:700}
    .title{font-family:'Raleway',sans-serif;font-weight:900;font-size:3.2rem;color:#fff;line-height:.92;letter-spacing:-.03em}
    .title span{color:#c9a84c}
    .body{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(255,255,255,.6);line-height:1.5;max-width:260px}
    .body strong{color:rgba(255,255,255,.85);font-style:normal}

    .sauce-list{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
    .sauce{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:100px;padding:5px 12px;font-size:.48rem;color:rgba(201,168,76,.8);font-weight:600;letter-spacing:.08em}

    .bottom{display:flex;flex-direction:column;align-items:center;gap:6px}
    .cta{font-size:.5rem;color:rgba(255,255,255,.3);letter-spacing:.3em;text-transform:uppercase;text-align:center}
    .url{font-family:'Raleway',sans-serif;font-weight:800;font-size:.65rem;color:#1870b8}
  </style>
</head>
<body>
  <div class="story">
    <div class="bg"></div>
    <div class="ov"></div>
    <div class="content">

      <div class="logo">MA<span>Y</span>EL</div>

      <div class="middle">
        <div class="eyebrow">The Secret</div>
        <div class="title">IT'S THE<br/><span>SAUCE.</span></div>
        <div class="body">Made in-house. <strong>Every single one.</strong><br/>That's the magic behind every bite.</div>
        <div class="sauce-list">
          <div class="sauce">Garlic</div>
          <div class="sauce">BBQ</div>
          <div class="sauce">Spicy</div>
          <div class="sauce">Honey Mustard</div>
          <div class="sauce">Ranch</div>
          <div class="sauce">Truffle</div>
        </div>
      </div>

      <div class="bottom">
        <div class="cta">Order at</div>
        <div class="url">mayelrestaurant.vercel.app</div>
      </div>

    </div>
  </div>
</body>
</html>
